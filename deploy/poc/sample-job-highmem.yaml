apiVersion: batch/v1
kind: Job
metadata:
  name: sample-job-highmem
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: poc-highmem-lq
    app: poc-sample-highmem
spec:
  suspend: true
  template:
    metadata:
      labels:
        app: poc-sample-highmem
    spec:
      restartPolicy: Never
      containers:
      - name: worker
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "[sample-job-highmem] Started at $(date)"
          echo "[sample-job-highmem] highmem queue admitted"
          sleep 5
          echo "[sample-job-highmem] Done."
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
