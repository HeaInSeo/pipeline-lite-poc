# Sample Job: validates Kueue pending -> admit flow
# Usage: kubectl apply -f sample-job.yaml
# Check: kubectl get workloads -n default
apiVersion: batch/v1
kind: Job
metadata:
  name: sample-job
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: poc-standard-lq
    app: poc-sample
spec:
  # suspend: true is required for Kueue to manage admission
  suspend: true
  template:
    metadata:
      labels:
        app: poc-sample
    spec:
      restartPolicy: Never
      containers:
      - name: worker
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "[sample-job] Started at $(date)"
          echo "[sample-job] Node: $NODE_NAME"
          echo "[sample-job] Running for 5s..."
          sleep 5
          echo "[sample-job] Done."
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
